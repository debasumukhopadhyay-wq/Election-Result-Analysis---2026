services:
  - type: web
    name: wb-election-2026
    runtime: node
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd .. && mkdir -p backend/public && cp -r frontend/dist/* backend/public/ && cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false

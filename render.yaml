services:
  # ── Backend API — Node.js Web Service ────────────────────────────────────────
  - type: web
    name: wb-election-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard → Environment

  # ── Frontend — Static Site ────────────────────────────────────────────────────
  - type: web
    name: wb-election-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend Render URL e.g. https://wb-election-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
